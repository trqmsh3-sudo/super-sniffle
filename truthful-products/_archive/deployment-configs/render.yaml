databases:
  - name: clearpick-db
    plan: free
    databaseName: clearpick
    user: clearpick

services:
  - type: web
    name: clearpick-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://www.clearpickai.com
      - key: DATABASE_URL
        fromDatabase:
          name: clearpick-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
