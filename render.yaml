services:
  - type: web
    name: clearpick
    runtime: node
    plan: free
    rootDir: clearpick
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 3000
